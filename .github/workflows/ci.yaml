name: CI-CD Docker Pipeline

on:
  push:
    branches:
      - main
      - trivy

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ci-html:1.0.1

  scan-trivy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.DOCKERHUB_USERNAME }}/ci-html:1.0.1"
          format: "table"
          exit-code: 0
          severity: "CRITICAL,HIGH"

  deploy:
    needs: scan-trivy
    runs-on: ubuntu-latest
    steps:
      - name: Final Deploy
        run: echo "Déploiement réussi sur Docker Hub !"